<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #ff2222; font-family: 'Share Tech Mono', monospace; padding: 20px; min-height: 100vh; }
  h1 { font-family: 'Orbitron', sans-serif; font-size: 2rem; text-align: center; letter-spacing: 4px; margin-bottom: 30px; text-shadow: 0 0 20px #ff2222; }
  h2 { font-family: 'Orbitron', sans-serif; font-size: 1rem; letter-spacing: 3px; margin: 25px 0 12px; color: #ff5555; border-bottom: 1px solid #330000; padding-bottom: 8px; }

  /* ERA MANAGEMENT */
  #eraList { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .era-tag { background: #1a0000; border: 1px solid #ff2222; padding: 6px 14px; border-radius: 4px; display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .era-tag button { background: none; border: none; color: #ff4444; cursor: pointer; font-size: 16px; line-height: 1; padding: 0; }
  .era-tag button:hover { color: #fff; }

  /* ACTION BUTTONS */
  .btn { padding: 9px 20px; background: #0a0a0a; color: #ff2222; border: 2px solid #ff2222; border-radius: 4px; font-family: 'Share Tech Mono', monospace; font-size: 14px; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
  .btn:hover { background: #ff2222; color: #000; }
  .btn-sm { padding: 5px 12px; font-size: 12px; border-width: 1px; }
  .btn-save { border-color: #22cc55; color: #22cc55; }
  .btn-save:hover { background: #22cc55; color: #000; }
  .btn-del { border-color: #ff2222; color: #ff2222; }
  .btn-del:hover { background: #ff2222; color: #000; }

  /* ADD QUESTION FORM */
  #addForm { background: #0f0000; border: 1px solid #330000; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-grid input, .form-grid select, .form-full input, .form-full select { width: 100%; padding: 9px 12px; background: #1a0000; color: #ff2222; border: 1px solid #440000; border-radius: 4px; font-family: 'Share Tech Mono', monospace; font-size: 14px; }
  .form-full { margin-bottom: 10px; }
  .form-footer { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .form-footer select { padding: 9px 12px; background: #1a0000; color: #ff2222; border: 1px solid #440000; border-radius: 4px; font-family: 'Share Tech Mono', monospace; font-size: 14px; }
  input::placeholder { color: #550000; }
  input:focus, select:focus { outline: none; border-color: #ff2222; box-shadow: 0 0 8px #ff222233; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 800px; }
  thead { background: #1a0000; }
  th { padding: 10px 8px; text-align: center; color: #ff5555; border: 1px solid #330000; font-weight: normal; letter-spacing: 1px; white-space: nowrap; }
  td { padding: 6px 8px; border: 1px solid #1a0000; text-align: center; vertical-align: middle; }
  tr:hover td { background: #0f0000; }
  td input, td select { width: 100%; padding: 5px 8px; background: #0a0a0a; color: #ff2222; border: 1px solid #330000; border-radius: 3px; font-family: 'Share Tech Mono', monospace; font-size: 12px; text-align: center; }
  td input:focus, td select:focus { outline: none; border-color: #ff4444; }
  .actions { display: flex; gap: 5px; justify-content: center; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: #440000; border-radius: 3px; }

  /* CLEAR DB */
  .btn-danger { border-color: #ff6600; color: #ff6600; }
  .btn-danger:hover { background: #ff6600; color: #000; }

  /* MODAL */
  #modalOverlay {
    display: none; position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.85); z-index: 100;
    align-items: center; justify-content: center;
  }
  #modalOverlay.active { display: flex; }
  #modalBox {
    background: #0f0000; border: 2px solid #ff6600; border-radius: 12px;
    padding: 32px 28px; width: 100%; max-width: 360px; text-align: center;
    box-shadow: 0 0 40px #ff660033; animation: popIn 0.25s ease;
  }
  @keyframes popIn { from { transform: scale(0.85); opacity:0; } to { transform: scale(1); opacity:1; } }
  #modalBox h3 { font-family: 'Orbitron', sans-serif; font-size: 1rem; letter-spacing: 3px; color: #ff6600; margin-bottom: 8px; }
  #modalBox p { font-size: 12px; color: #884400; margin-bottom: 20px; line-height: 1.6; }
  #modalPassword {
    width: 100%; padding: 11px 14px; background: #1a0000; color: #ff2222;
    border: 1px solid #440000; border-radius: 6px; font-family: 'Share Tech Mono', monospace;
    font-size: 16px; text-align: center; margin-bottom: 16px; letter-spacing: 2px;
  }
  #modalPassword:focus { outline: none; border-color: #ff6600; box-shadow: 0 0 10px #ff660033; }
  #modalStatus { min-height: 18px; font-size: 12px; margin-bottom: 14px; }
  .modal-btns { display: flex; gap: 10px; justify-content: center; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>⚙ ADMIN PANEL</h1>

<div style="text-align:right;margin-bottom:10px;">
  <button class="btn btn-danger" onclick="openClearModal()">⚠ Clear Database</button>
</div>

<!-- CLEAR DATABASE MODAL -->
<div id="modalOverlay">
  <div id="modalBox">
    <h3>⚠ CLEAR DATABASE</h3>
    <p>This will permanently delete ALL eras and questions from the database. This cannot be undone.</p>
    <input type="password" id="modalPassword" placeholder="Enter admin password">
    <div id="modalStatus"></div>
    <div class="modal-btns">
      <button class="btn btn-danger" onclick="confirmClear()">Delete Everything</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<h2>MANAGE ERAS</h2>
<div id="eraList">Loading...</div>
<div style="display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap;">
  <input type="text" id="eraNameInput" placeholder="New era name..." style="padding:9px 14px;background:#1a0000;color:#ff2222;border:1px solid #440000;border-radius:4px;font-family:'Share Tech Mono',monospace;font-size:14px;flex:1;min-width:180px;max-width:300px;">
  <button class="btn" onclick="addEra()">+ Add Era</button>
</div>

<h2>ADD QUESTION</h2>
<div id="addForm">
  <div class="form-full">
    <input type="text" id="questionText" placeholder="Question text...">
  </div>
  <div class="form-grid">
    <input type="text" id="optionA" placeholder="Option A">
    <input type="text" id="optionB" placeholder="Option B">
    <input type="text" id="optionC" placeholder="Option C">
    <input type="text" id="optionD" placeholder="Option D">
  </div>
  <div class="form-footer">
    <select id="eraSelect"></select>
    <select id="correctSelect">
      <option value="A">Correct: A</option>
      <option value="B">Correct: B</option>
      <option value="C">Correct: C</option>
      <option value="D">Correct: D</option>
    </select>
    <button class="btn" id="addQuestionBtn">+ Add Question</button>
  </div>
</div>

<h2>MANAGE QUESTIONS</h2>
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Era</th>
        <th>Question</th>
        <th>A</th>
        <th>B</th>
        <th>C</th>
        <th>D</th>
        <th>Correct</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="questionsBody"></tbody>
  </table>
</div>

<script>
let eras = [], questions = [];

async function fetchEras() {
  const res = await fetch("/eras");
  eras = await res.json();
  renderEras();
  populateEraSelect();
}

function renderEras() {
  const div = document.getElementById("eraList");
  if (!eras.length) { div.innerHTML = '<span style="color:#550000">No eras yet.</span>'; return; }
  div.innerHTML = "";
  eras.forEach(e => {
    const tag = document.createElement("div");
    tag.className = "era-tag";
    tag.innerHTML = `${e.name} <button onclick="deleteEra(${e.id})" title="Delete era">✕</button>`;
    div.appendChild(tag);
  });
}

function populateEraSelect() {
  const sel = document.getElementById("eraSelect");
  sel.innerHTML = eras.map(e => `<option value="${e.id}">${e.name}</option>`).join("");
}

async function addEra() {
  const input = document.getElementById("eraNameInput");
  const name = input.value.trim();
  if (!name) { input.focus(); input.style.borderColor = "#ff2222"; return; }
  input.style.borderColor = "#440000";
  await fetch("/eras", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name }) });
  input.value = "";
  await fetchEras();
}

async function deleteEra(id) {
  if (!confirm("Delete this era AND all its questions permanently?")) return;
  await fetch(`/eras/${id}`, { method: "DELETE" });
  await fetchEras();
  await fetchQuestions();
}

async function fetchQuestions() {
  const res = await fetch("/questions/0");
  questions = await res.json();
  renderQuestions();
}

document.getElementById("addQuestionBtn").onclick = async function () {
  if (!eras.length) return alert("Please add an era first!");
  const era_id = document.getElementById("eraSelect").value;
  const text = document.getElementById("questionText").value.trim();
  const option_a = document.getElementById("optionA").value.trim();
  const option_b = document.getElementById("optionB").value.trim();
  const option_c = document.getElementById("optionC").value.trim();
  const option_d = document.getElementById("optionD").value.trim();
  const correct = document.getElementById("correctSelect").value;
  if (!text || !option_a || !option_b || !option_c || !option_d) return alert("All fields required!");
  await fetch("/questions", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ era_id, text, option_a, option_b, option_c, option_d, correct })
  });
  ["questionText","optionA","optionB","optionC","optionD"].forEach(id => document.getElementById(id).value = "");
  await fetchQuestions();
};

function renderQuestions() {
  const tbody = document.getElementById("questionsBody");
  tbody.innerHTML = "";
  if (!questions.length) {
    tbody.innerHTML = `<tr><td colspan="9" style="color:#550000;padding:20px">No questions yet.</td></tr>`;
    return;
  }
  questions.forEach(q => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${q.id}</td>
      <td>
        <select id="era-${q.id}">
          ${eras.map(e => `<option value="${e.id}" ${e.id === q.era_id ? "selected" : ""}>${e.name}</option>`).join("")}
        </select>
      </td>
      <td><input value="${escHtml(q.text)}" id="text-${q.id}"></td>
      <td><input value="${escHtml(q.option_a)}" id="a-${q.id}"></td>
      <td><input value="${escHtml(q.option_b)}" id="b-${q.id}"></td>
      <td><input value="${escHtml(q.option_c)}" id="c-${q.id}"></td>
      <td><input value="${escHtml(q.option_d)}" id="d-${q.id}"></td>
      <td>
        <select id="correct-${q.id}">
          ${["A","B","C","D"].map(v => `<option value="${v}" ${q.correct===v?"selected":""}>${v}</option>`).join("")}
        </select>
      </td>
      <td>
        <div class="actions">
          <button class="btn btn-sm btn-save" onclick="saveQuestion(${q.id})">Save</button>
          <button class="btn btn-sm btn-del" onclick="deleteQuestion(${q.id})">Del</button>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function escHtml(str) {
  return String(str).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

async function saveQuestion(id) {
  const era_id = parseInt(document.getElementById(`era-${id}`).value);
  const text = document.getElementById(`text-${id}`).value.trim();
  const option_a = document.getElementById(`a-${id}`).value.trim();
  const option_b = document.getElementById(`b-${id}`).value.trim();
  const option_c = document.getElementById(`c-${id}`).value.trim();
  const option_d = document.getElementById(`d-${id}`).value.trim();
  const correct = document.getElementById(`correct-${id}`).value;
  if (!text || !option_a || !option_b || !option_c || !option_d) return alert("All fields required!");
  await fetch(`/questions/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ era_id, text, option_a, option_b, option_c, option_d, correct })
  });
  await fetchQuestions();
}

async function deleteQuestion(id) {
  if (!confirm("Delete this question?")) return;
  await fetch(`/questions/${id}`, { method: "DELETE" });
  await fetchQuestions();
}

async function init() { await fetchEras(); await fetchQuestions(); }
init();

document.addEventListener("DOMContentLoaded", () => {
  const eraInput = document.getElementById("eraNameInput");
  if (eraInput) eraInput.addEventListener("keydown", e => { if (e.key === "Enter") addEra(); });
  document.getElementById("modalPassword").addEventListener("keydown", e => { if (e.key === "Enter") confirmClear(); });
});

// --- CLEAR DATABASE ---
function openClearModal() {
  document.getElementById("modalPassword").value = "";
  document.getElementById("modalStatus").textContent = "";
  document.getElementById("modalStatus").style.color = "#ff6600";
  document.getElementById("modalOverlay").classList.add("active");
  setTimeout(() => document.getElementById("modalPassword").focus(), 100);
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("active");
}

// Close modal if overlay background clicked
document.getElementById("modalOverlay").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

async function confirmClear() {
  const pwd = document.getElementById("modalPassword").value;
  const statusEl = document.getElementById("modalStatus");

  if (pwd !== "HappyBirthdayToby") {
    statusEl.style.color = "#ff2222";
    statusEl.textContent = "Incorrect password.";
    document.getElementById("modalPassword").value = "";
    document.getElementById("modalPassword").focus();
    return;
  }

  statusEl.style.color = "#ff6600";
  statusEl.textContent = "Clearing...";

  try {
    const res = await fetch("/clear-database", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pwd })
    });
    const data = await res.json();
    if (data.success) {
      statusEl.style.color = "#22cc55";
      statusEl.textContent = "Database cleared successfully.";
      setTimeout(() => {
        closeModal();
        init();
      }, 1200);
    } else {
      statusEl.style.color = "#ff2222";
      statusEl.textContent = data.error || "Failed to clear database.";
    }
  } catch (err) {
    statusEl.style.color = "#ff2222";
    statusEl.textContent = "Network error. Try again.";
  }
}
</script>
</body>
</html>
