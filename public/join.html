<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000;
    color: #ff2222;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
  }
  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.1rem, 4vw, 1.8rem);
    letter-spacing: 3px;
    text-align: center;
    text-shadow: 0 0 20px #ff2222;
    margin-bottom: 8px;
  }
  .subtitle { color: #660000; font-size: 12px; letter-spacing: 2px; margin-bottom: 36px; text-align: center; }

  .form-card {
    background: #0a0000;
    border: 1px solid #330000;
    border-radius: 14px;
    padding: 30px 28px;
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  label { font-size: 11px; letter-spacing: 2px; color: #880000; display: block; margin-bottom: 5px; }
  input, select {
    width: 100%;
    padding: 12px 16px;
    background: #0f0000;
    color: #ff2222;
    border: 1px solid #440000;
    border-radius: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    transition: border-color 0.2s;
  }
  input:focus, select:focus { outline: none; border-color: #ff2222; box-shadow: 0 0 10px #ff222222; }
  input::placeholder { color: #440000; }
  input[readonly] { color: #ff5555; border-color: #330000; }

  .avatar-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .avatar-opt {
    width: 50px; height: 50px;
    border: 2px solid #330000;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    cursor: pointer;
    transition: all 0.15s;
    background: #0f0000;
  }
  .avatar-opt:hover { border-color: #ff2222; transform: scale(1.1); }
  .avatar-opt.selected { border-color: #ff2222; background: #1a0000; box-shadow: 0 0 12px #ff222244; }

  .btn-join {
    padding: 14px;
    background: #ff2222;
    color: #000;
    border: none;
    border-radius: 8px;
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 6px;
  }
  .btn-join:hover { background: #fff; box-shadow: 0 0 20px #ff222299; }
  .btn-join:active { transform: scale(0.97); }

  .error { color: #ff5555; font-size: 12px; text-align: center; min-height: 18px; }
</style>
</head>
<body>

<h1>🎮 JOIN THE GAME</h1>
<p class="subtitle">TOBY'S BIRTHDAY QUIZ</p>

<div class="form-card">
  <div>
    <label>YOUR NAME</label>
    <input type="text" id="playerName" placeholder="Enter your name..." maxlength="20" autocomplete="off">
  </div>

  <div>
    <label>CHOOSE AVATAR</label>
    <div class="avatar-row" id="avatarRow"></div>
    <input type="hidden" id="avatarValue" value="🎉">
  </div>

  <div>
    <label>GAME PIN</label>
    <input type="text" id="gamePinInput" placeholder="Game PIN" readonly>
  </div>

  <p class="error" id="errorMsg"></p>
  <button class="btn-join" id="joinBtn">JOIN GAME</button>
</div>

<script>
const avatars = ["🎉","🎂","🎁","🕺","💃","🦄","🔥","⚡","🎯","🏆"];
const avatarRow = document.getElementById("avatarRow");
let selectedAvatar = "🎉";

avatars.forEach(av => {
  const d = document.createElement("div");
  d.className = "avatar-opt" + (av === selectedAvatar ? " selected" : "");
  d.textContent = av;
  d.onclick = () => {
    document.querySelectorAll(".avatar-opt").forEach(el => el.classList.remove("selected"));
    d.classList.add("selected");
    selectedAvatar = av;
  };
  avatarRow.appendChild(d);
});

// Pre-fill pin from URL
const params = new URLSearchParams(window.location.search);
const pin = params.get("pin");
if (pin) document.getElementById("gamePinInput").value = pin;

document.getElementById("joinBtn").onclick = joinGame;
document.getElementById("playerName").addEventListener("keydown", e => { if (e.key === "Enter") joinGame(); });

function joinGame() {
  const name = document.getElementById("playerName").value.trim();
  const pinValue = document.getElementById("gamePinInput").value.trim();
  const errorEl = document.getElementById("errorMsg");

  if (!name) { errorEl.textContent = "Please enter your name."; return; }
  if (!pinValue) { errorEl.textContent = "Game PIN is missing."; return; }

  errorEl.textContent = "";
  localStorage.setItem("playerName", name);
  localStorage.setItem("playerAvatar", selectedAvatar);
  localStorage.setItem("gamePin", pinValue);

  // Navigate — game.html will emit player-join with its own fresh socket
  window.location.href = `/game.html?pin=${pinValue}`;
}
</script>
</body>
</html>
