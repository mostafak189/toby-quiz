<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Era</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000;
    color: #ff2222;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
  }
  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.2rem, 3.5vw, 2rem);
    letter-spacing: 4px;
    text-align: center;
    text-shadow: 0 0 20px #ff2222;
    margin-bottom: 10px;
  }
  .subtitle { color: #660000; font-size: 12px; letter-spacing: 2px; margin-bottom: 40px; text-align: center; }

  #eraContainer {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px;
    max-width: 800px;
  }
  .era-card {
    padding: 28px 40px;
    background: #0f0000;
    border: 2px solid #ff2222;
    color: #ff2222;
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(14px, 2.5vw, 20px);
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.2s;
    text-align: center;
    min-width: 180px;
  }
  .era-card:hover {
    background: #ff2222;
    color: #000;
    transform: scale(1.05);
    box-shadow: 0 0 30px #ff2222aa;
  }
  .era-card:active { transform: scale(0.97); }
  .msg { color: #550000; font-size: 14px; }
</style>
</head>
<body>

<h1>SELECT AN ERA</h1>
<p class="subtitle">HOST: CHOOSE THE QUIZ CATEGORY</p>

<div id="eraContainer">
  <div class="msg">Loading eras...</div>
</div>

<script>
const socket = io();
const params = new URLSearchParams(window.location.search);
const pin = params.get("pin");
const container = document.getElementById("eraContainer");

fetch("/eras")
  .then(res => res.json())
  .then(eras => {
    container.innerHTML = "";
    if (!eras.length) {
      container.innerHTML = '<div class="msg">No eras available. Add eras in admin first.</div>';
      return;
    }
    eras.forEach(era => {
      const btn = document.createElement("div");
      btn.className = "era-card";
      btn.textContent = era.name;
      btn.onclick = () => {
        socket.emit("select-era", { pin, era: era.name });
        window.location.href = `/game.html?pin=${pin}&host=true`;
      };
      container.appendChild(btn);
    });
  })
  .catch(() => {
    container.innerHTML = '<div class="msg">Failed to load eras. Check server connection.</div>';
  });
</script>
</body>
</html>
