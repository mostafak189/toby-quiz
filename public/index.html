<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Malone</title>
<style>
html, body {
  margin:0; padding:0; height:100%; overflow:hidden;
  font-family: Arial, sans-serif;
  display:flex; justify-content:center; align-items:center;
  background: linear-gradient(135deg,#f0f4f8,#d9e2ec);
}
#confettiCanvas {
  position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0;
}
.messageOverlay {
  position: fixed; top:50%; left:50%;
  transform: translate(-50%,-50%);
  font-size:3.5em; font-weight:bold; color:#ff4081;
  text-shadow:0 0 5px #fff,0 0 10px #ff4081,0 0 15px #ff85a1,0 0 20px #ff85a1;
  z-index:1;
  animation: sparkle 1s infinite;
}
@keyframes sparkle{
  0%,100%{text-shadow:0 0 5px #fff,0 0 10px #ff4081,0 0 15px #ff85a1,0 0 20px #ff85a1;}
  50%{text-shadow:0 0 8px #fff,0 0 15px #ff4081,0 0 25px #ff85a1,0 0 30px #ff85a1;}
}
</style>
</head>
<body>
<canvas id="confettiCanvas"></canvas>
<div class="messageOverlay">Happy Birthday Malone</div>

<script>
// Auto redirect after 10 seconds
setTimeout(()=>{window.location.href='main.html';},10000);

// Confetti
const canvas=document.getElementById('confettiCanvas');
const ctx=canvas.getContext('2d');
let W=canvas.width=window.innerWidth;
let H=canvas.height=window.innerHeight;
const confettiCount=200;
const confetti=[];
const colors=['#ff0a54','#ff477e','#ff7096','#ff85a1','#ffe066','#ffca3a'];
function random(min,max){return Math.random()*(max-min)+min;}
for(let i=0;i<confettiCount;i++){
  confetti.push({x:random(0,W),y:random(-H,0),r:random(4,10),d:random(1,3),color:colors[Math.floor(Math.random()*colors.length)],tilt:random(-10,10),tiltAngleIncremental:random(0.05,0.12),tiltAngle:0});
}
function draw(){ctx.clearRect(0,0,W,H);for(let i=0;i<confettiCount;i++){let c=confetti[i];ctx.beginPath();ctx.lineWidth=c.r;ctx.strokeStyle=c.color;ctx.moveTo(c.x+c.tilt+c.r/2,c.y);ctx.lineTo(c.x+c.tilt,c.y+c.tilt+c.r/2);ctx.stroke();} update();}
function update(){for(let i=0;i<confettiCount;i++){let c=confetti[i];c.tiltAngle+=c.tiltAngleIncremental;c.y+=(Math.cos(c.d)+3+c.r/2)/2;c.x+=Math.sin(c.d);c.tilt=Math.sin(c.tiltAngle)*15;if(c.y>H){c.x=random(0,W);c.y=-20;}}}
function animate(){draw();requestAnimationFrame(animate);}
animate();
window.addEventListener('resize',()=>{W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;});
</script>
</body>
