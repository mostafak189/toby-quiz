<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanks for playing!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Share+Tech+Mono&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px 20px;
    overflow: hidden;
  }

  #confettiCanvas {
    position: fixed; top:0; left:0;
    width:100%; height:100%;
    pointer-events: none; z-index: 0;
  }

  .content { position: relative; z-index: 1; }

  .emoji { font-size: 5rem; margin-bottom: 20px; animation: bounce 1.4s ease-in-out infinite; }
  @keyframes bounce {
    0%,100% { transform: translateY(0) rotate(-5deg); }
    50%      { transform: translateY(-20px) rotate(5deg); }
  }

  h1 {
    font-family: 'Pacifico', cursive;
    font-size: clamp(1.8rem, 6vw, 3.2rem);
    background: linear-gradient(90deg, #ff6ec7, #ffd700, #ff6b6b, #a8ff78, #78ffd6, #ffd700, #ff6ec7);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite;
    margin-bottom: 14px;
  }
  @keyframes shimmer {
    0%   { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  p {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    color: #660000;
    letter-spacing: 2px;
    margin-top: 10px;
  }
</style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>

<div class="content">
  <div class="emoji">🎉</div>
  <h1>Thanks for playing!</h1>
  <p>You can close this tab now.</p>
</div>

<script>
const canvas = document.getElementById("confettiCanvas");
const ctx    = canvas.getContext("2d");
let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

const pieces = [];
const colors = ["#ffd700","#ff2222","#ff8c00","#fff","#22cc55","#3498db","#ff6ec7"];
for (let i = 0; i < 120; i++) {
  pieces.push({
    x: Math.random() * W,
    y: Math.random() * -H,
    r: Math.random() * 7 + 3,
    d: Math.random() * 3 + 1,
    color: colors[Math.floor(Math.random() * colors.length)],
    tilt: Math.random() * 10 - 10,
    tiltAngle: 0,
    tiltInc: Math.random() * 0.07 + 0.05
  });
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  pieces.forEach(c => {
    ctx.beginPath();
    ctx.lineWidth   = c.r / 2;
    ctx.strokeStyle = c.color;
    ctx.moveTo(c.x + c.tilt + c.r / 2, c.y);
    ctx.lineTo(c.x + c.tilt, c.y + c.tilt + c.r / 2);
    ctx.stroke();
    c.tiltAngle += c.tiltInc;
    c.y   += (Math.cos(c.d) + 3 + c.r / 2) / 2;
    c.x   += Math.sin(c.d);
    c.tilt = Math.sin(c.tiltAngle) * 15;
    if (c.y > H) { c.x = Math.random() * W; c.y = -20; }
  });
  requestAnimationFrame(draw);
}
draw();
window.addEventListener("resize", () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });
</script>
</body>
</html>
